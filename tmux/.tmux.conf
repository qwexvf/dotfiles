set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

unbind C-b
set-option -g prefix C-q
bind C-q send-prefix

set-option -g focus-events on

set-option -g history-limit 10000
set-option -g -q mouse on
set -s escape-time 0

set-option -g status-justify centre
set-option -g allow-rename off
set -g renumber-windows on

set -sg escape-time 1
set -g base-index 1
setw -g pane-base-index 1

bind r source-file ~/.tmux.conf \; display "Reloaded!"

bind C-a send-prefix
bind | split-window -h
bind - split-window -v
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'jimeh/tmuxifier'
set -g @plugin 'tmux-autosessions'

# Mountain dusk theme
set -g message-style "bg=#0a0810,fg=#b8b0ac"
set -g pane-active-border-style "bg=#0a0810,fg=#7888a0"
set -g pane-border-style "bg=#0a0810,fg=#1a1420"
set -g status-style "bg=#0a0810,fg=#b8b0ac"
setw -g window-status-activity-style "bg=#1a1420,fg=#a08850"
setw -g window-status-current-style "bg=#7888a0,fg=#0a0810"

# Window status format
setw -g window-status-current-format " ◉ #I #W "
setw -g window-status-format " ○ #I #W "

# Status bar
set -g status-left "#[fg=#7888a0,bg=#1a1420]  #S #[default] "
if-shell '[[ $(uname) = Darwin ]]' \
    'set -g status-right "#[fg=#5a6880] %a %d %b #[fg=#7888a0]%I:%M%p "' \
    'set -g status-right "#[fg=#5a6880] %a %d %b #[fg=#7888a0]%I:%M%P "'

run '~/.tmux/plugins/tpm/tpm'