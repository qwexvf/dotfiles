set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

unbind C-b
set-option -g prefix C-q
bind C-q send-prefix

set-option -g focus-events on

set-option -g history-limit 10000
set-option -g -q mouse on
set -s escape-time 0

set-option -g status-justify centre
set-option -g allow-rename off
set -g renumber-windows on

set -sg escape-time 1
set -g base-index 1
setw -g pane-base-index 1

bind r source-file ~/.tmux.conf \; display "Reloaded!"

bind C-a send-prefix
bind | split-window -h
bind - split-window -v
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'jimeh/tmuxifier'
set -g @plugin 'tmux-autosessions'

# Moonfly + 2D Space Theme
set -g message-style "bg=#080808,fg=#bdbdbd"
set -g pane-active-border-style "bg=#080808,fg=#80a0ff"
set -g pane-border-style "bg=#080808,fg=#323437"
set -g status-style "bg=#080808,fg=#bdbdbd"
setw -g window-status-activity-style "bg=#323437,fg=#e3c78a"
setw -g window-status-current-style "bg=#80a0ff,fg=#080808"

# 2D Space window status format
setw -g window-status-current-format " ◉ #I #W "
setw -g window-status-format " ○ #I #W "

# Space-themed status bar
set -g status-left "#[fg=#80a0ff,bg=#323437] 🚀 #S #[default] "
if-shell '[[ $(uname) = Darwin ]]' \
    'set -g status-right "#[fg=#cf87e8] %a %d %b #[fg=#80a0ff]%I:%M%p "' \
    'set -g status-right "#[fg=#cf87e8] %a %d %b #[fg=#80a0ff]%I:%M%P "'

run '~/.tmux/plugins/tpm/tpm'