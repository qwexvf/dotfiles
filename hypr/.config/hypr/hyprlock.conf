# Minimal dark theme

general {
    hide_cursor = true
    ignore_empty_input = false
    immediate_render = false
    fail_timeout = 2000
}

auth {
    pam:enabled = true
    pam:module = hyprlock
}

background {
    monitor =
    color = rgb(0a0a0a)
}

# Time - large, centered
label {
    monitor =
    text = $TIME
    color = rgb(e0e0e0)
    font_size = 96
    font_family = ZedMono Nerd Font

    position = 0, 200
    halign = center
    valign = center
}

# Date - subtle below time
label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    color = rgb(555555)
    font_size = 16
    font_family = ZedMono Nerd Font

    position = 0, 120
    halign = center
    valign = center
}

# Input field - visible
input-field {
    monitor =
    size = 300, 50

    outline_thickness = 3
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true

    outer_color = rgb(7aa2b3)
    inner_color = rgb(1a1a1a)
    font_color = rgb(ffffff)
    font_family = ZedMono Nerd Font

    fade_on_empty = false
    placeholder_text =

    hide_input = false
    rounding = 0

    check_color = rgb(7aa2b3)
    fail_color = rgb(b36a6a)
    fail_text = $FAIL ($ATTEMPTS)

    position = 0, 0
    halign = center
    valign = center
}

# Username - small hint below input
label {
    monitor =
    text = $USER
    color = rgb(444444)
    font_size = 11
    font_family = ZedMono Nerd Font

    position = 0, -40
    halign = center
    valign = center
}
