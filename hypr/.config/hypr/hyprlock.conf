# Mountain dusk lock screen

general {
    hide_cursor = true
    ignore_empty_input = false
    immediate_render = false
    fail_timeout = 2000
}

auth {
    pam:enabled = true
    pam:module = hyprlock
}

background {
    monitor =
    path = /home/qwexvf/dotfiles/wallpapers/simple-dark.jpg
    blur_passes = 3
    blur_size = 8
    brightness = 0.6
}

label {
    monitor =
    text = $TIME
    color = rgb(dbd4d0)
    font_size = 96
    font_family = ZedMono Nerd Font

    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    color = rgb(5a6880)
    font_size = 16
    font_family = ZedMono Nerd Font

    position = 0, 120
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 50

    outline_thickness = 3
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true

    outer_color = rgb(7888a0)
    inner_color = rgb(141018)
    font_color = rgb(dbd4d0)
    font_family = ZedMono Nerd Font

    fade_on_empty = false
    placeholder_text =

    hide_input = false
    rounding = 8

    check_color = rgb(7888a0)
    fail_color = rgb(d04040)
    fail_text = $FAIL ($ATTEMPTS)

    position = 0, 0
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = rgb(3a2830)
    font_size = 11
    font_family = ZedMono Nerd Font

    position = 0, -40
    halign = center
    valign = center
}
