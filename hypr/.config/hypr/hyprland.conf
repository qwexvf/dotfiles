$terminal = alacritty
$fileManager = dolphin
$menu = fuzzel

# Dark theme environment variables
env = GTK_THEME,Adwaita:dark
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,adwaita-dark

exec-once = nm-applet
exec-once = waybar
exec-once = hypridle
exec-once = hyprpaper
exec-once = hyprlock
exec-once = swaync
exec-once = fcitx5 -d
exec-once = swayosd-server

ecosystem {
    no_update_news = true
}

general {
    gaps_in = 2
    gaps_out = 4

    border_size = 2

    # Black, gray + soft blue accent
    col.active_border = rgb(7aa2b3)
    col.inactive_border = rgb(222222)

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}

animations {
    enabled = yes, please :)

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc { 
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }

    kb_options=ctrl:nocaps

    repeat_rate = 30
    repeat_delay = 200
}

xwayland {
    enabled = false
}

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod CTRL, l, exec, hyprlock
bind = $mainMod, V, togglefloating,
bind = $mainMod, f, fullscreen, 1
bind = $mainMod, D, exec, $menu
bind = $mainMod, N, exec, swaync-client -t -sw
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, S, togglesplit, # dwindle

bind = $mainMod, B, exec, grim -g "$(slurp -d)" - | wl-copy
bind = $mainMod, SPACE, exec, geo="$(slurp)"; sleep 5; grim -g "$geo" - | wl-copy

# writes screenshot to a file

# $mainMod + Shift + S: Save selected area immediately (alternative binding)
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" ~/Downloads/shot_$(date +%Y%m%d_%H%M%S).png
# $mainMod + Shift + F: Save selected area after 5 seconds (alternative binding)
bind = $mainMod SHIFT, F, exec, geo="$(slurp)"; sleep 5; grim -g "$geo" ~/Downloads/shot_$(date +%Y%m%d_%H%M%S).png

# Screen recording (5 seconds)
bind = $mainMod, R, exec, geo="$(slurp)"; timeout 5 wf-recorder -g "$geo" -f ~/Downloads/rec_$(date +%Y%m%d_%H%M%S).mp4

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move focus with mainMod + HJKL
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move windows with mainMod + SHIFT + HJKL
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# Resize windows with mainMod + CTRL + HJKL
binde = $mainMod CTRL, h, resizeactive, -20 0
binde = $mainMod CTRL, l, resizeactive, 20 0
binde = $mainMod CTRL, k, resizeactive, 0 -20
binde = $mainMod CTRL, j, resizeactive, 0 20

# Mouse bindings for floating windows
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Brightness controls (with OSD)
bindel = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# Volume controls (with OSD)
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindl = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindl = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace (scratchpad) for Slack
bind = $mainMod, grave, togglespecialworkspace, slack
bind = $mainMod SHIFT, grave, movetoworkspace, special:slack

# Window rules (Hyprland 0.53+ block syntax)
windowrule {
    name = all-windows-opaque
    match:class = .*
    opacity = 1.0 1.0
}

windowrule {
    name = browsers-opaque
    match:class = ^(firefox|chrome|chromium).*$
    opacity = 1.0 1.0
}

# Godot - fix click offset issues
windowrule {
    name = godot-fixes
    match:class = ^org\.godotengine\..*$
    float = yes
}

# Slack scratchpad
windowrule {
    name = slack-scratchpad
    match:class = ^(Slack|slack)$
    workspace = special:slack
    float = yes
    size = 80% 80%
    center = yes
}

source = ~/.config/hypr/thinkpad.conf
