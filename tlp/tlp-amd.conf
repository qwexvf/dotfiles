# TLP AMD ThinkPad Z13 Gen 2 - Maximum Battery Saving Config
# Deploy: sudo cp /home/qwexvf/dotfiles/tlp/tlp-amd.conf /etc/tlp.d/01-amd-thinkpad.conf
# Enable: sudo systemctl enable --now tlp.service

# =============================================================================
# CPU - AMD Ryzen 7840U with amd-pstate-epp
# =============================================================================

CPU_DRIVER_OPMODE_ON_AC=active
CPU_DRIVER_OPMODE_ON_BAT=guided

CPU_SCALING_GOVERNOR_ON_AC=powersave
CPU_SCALING_GOVERNOR_ON_BAT=powersave

# Energy Performance Preference - maximum power saving on battery
CPU_ENERGY_PERF_POLICY_ON_AC=balance_performance
CPU_ENERGY_PERF_POLICY_ON_BAT=power
CPU_ENERGY_PERF_POLICY_ON_SAV=power

# Disable turbo boost on battery (huge power saver ~2-4W)
CPU_BOOST_ON_AC=1
CPU_BOOST_ON_BAT=0
CPU_BOOST_ON_SAV=0

# Limit CPU frequency on battery (optional, uncomment for even more savings)
# CPU_SCALING_MAX_FREQ_ON_BAT=2500000

# Limit online CPUs on battery (saves power, reduces performance)
# CPU_MAX_PERF_ON_BAT=50

# Platform profile (ThinkPad ACPI)
PLATFORM_PROFILE_ON_AC=performance
PLATFORM_PROFILE_ON_BAT=low-power
PLATFORM_PROFILE_ON_SAV=low-power

# =============================================================================
# AMD GPU - Radeon 780M
# =============================================================================

# DPM performance level
RADEON_DPM_PERF_LEVEL_ON_AC=auto
RADEON_DPM_PERF_LEVEL_ON_BAT=low

# AMD Adaptive Backlight Modulation (saves ~0.5-1W on OLED/high-brightness displays)
# 0=off, 1=low, 2=medium, 3=high, 4=max savings
AMDGPU_ABM_LEVEL_ON_AC=0
AMDGPU_ABM_LEVEL_ON_BAT=3
AMDGPU_ABM_LEVEL_ON_SAV=4

# =============================================================================
# WIFI
# =============================================================================

WIFI_PWR_ON_AC=off
WIFI_PWR_ON_BAT=on

# =============================================================================
# AUDIO
# =============================================================================

# Power saving timeout in seconds
SOUND_POWER_SAVE_ON_AC=1
SOUND_POWER_SAVE_ON_BAT=1
SOUND_POWER_SAVE_CONTROLLER=Y

# =============================================================================
# PCIe / RUNTIME POWER MANAGEMENT
# =============================================================================

# PCIe ASPM (Active State Power Management)
PCIE_ASPM_ON_AC=default
PCIE_ASPM_ON_BAT=powersupersave

# Runtime PM for all PCIe devices
RUNTIME_PM_ON_AC=on
RUNTIME_PM_ON_BAT=auto

# Runtime PM driver denylist (devices that cause issues with auto suspend)
# RUNTIME_PM_DRIVER_DENYLIST="mei_me nouveau radeon"

# =============================================================================
# STORAGE
# =============================================================================

# AHCI link power management
AHCI_RUNTIME_PM_ON_AC=on
AHCI_RUNTIME_PM_ON_BAT=auto

# NVMe Runtime PM (if not already handled)
DISK_APM_LEVEL_ON_AC="254 254"
DISK_APM_LEVEL_ON_BAT="128 128"

# Disk spindown timeout (for HDDs, NVMe ignores this)
DISK_SPINDOWN_TIMEOUT_ON_AC="0 0"
DISK_SPINDOWN_TIMEOUT_ON_BAT="0 0"

# SATA aggressive link power management
SATA_LINKPWR_ON_AC="med_power_with_dipm max_performance"
SATA_LINKPWR_ON_BAT="min_power med_power_with_dipm"

# =============================================================================
# USB
# =============================================================================

# USB autosuspend (1=enable)
USB_AUTOSUSPEND=1

# Autosuspend timeout in seconds
USB_AUTOSUSPEND_TIMEOUT_ON_AC=20
USB_AUTOSUSPEND_TIMEOUT_ON_BAT=2

# Exclude certain USB devices from autosuspend (e.g., mouse, keyboard)
# Use `tlp-stat -u` to find device IDs
# USB_DENYLIST="1234:5678"

# =============================================================================
# THINKPAD BATTERY
# =============================================================================

# Battery charge thresholds (extends battery lifespan significantly)
# Starts charging at 75%, stops at 80%
START_CHARGE_THRESH_BAT0=75
STOP_CHARGE_THRESH_BAT0=80

# Force discharge when on AC (set to 1 to use battery even on AC)
# NATACPI_ENABLE=1

# =============================================================================
# KERNEL & MISC
# =============================================================================

# Disable NMI watchdog (saves ~1W)
NMI_WATCHDOG=0

# Writeback timeout - how long dirty data stays in memory before writing to disk
MAX_LOST_WORK_SECS_ON_AC=15
MAX_LOST_WORK_SECS_ON_BAT=60

# Memory power mode (if supported)
MEM_SLEEP_ON_AC=s2idle
MEM_SLEEP_ON_BAT=s2idle

# =============================================================================
# DEVICE BLOCKLIST FOR MAXIMUM BATTERY
# =============================================================================

# Bluetooth (uncomment to disable on battery for extra savings)
# DEVICES_TO_DISABLE_ON_BAT="bluetooth"
# DEVICES_TO_ENABLE_ON_AC="bluetooth"

# Disable specific drivers on battery (aggressive)
# DEVICES_TO_DISABLE_ON_BAT_NOT_IN_USE="bluetooth wwan"
