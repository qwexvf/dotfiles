# Kernel sysctl settings for power saving
# Deploy: sudo cp 99-powersave.conf /etc/sysctl.d/99-powersave.conf

# Laptop mode - delay disk writes when on battery (TLP handles this, but backup)
vm.laptop_mode = 5

# Reduce disk writes - increase dirty writeback time
vm.dirty_writeback_centisecs = 6000
vm.dirty_expire_centisecs = 6000

# Reduce swappiness (less disk I/O)
vm.swappiness = 10

# Disable NMI watchdog (saves ~1W)
kernel.nmi_watchdog = 0

# Reduce kernel log level (less disk writes)
kernel.printk = 3 3 3 3
