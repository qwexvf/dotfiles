# Mountain dusk theme for Alacritty

[colors]
draw_bold_text_with_bright_colors = true

[colors.bright]
black = "#6a5058"
blue = "#7888a0"
cyan = "#6a9090"
green = "#7a9068"
magenta = "#a06888"
red = "#d86878"
white = "#dbd4d0"
yellow = "#b8a068"

[colors.cursor]
cursor = "#7888a0"
text = "#0a0810"

[colors.normal]
black = "#1a1420"
blue = "#5a6880"
cyan = "#508080"
green = "#5a7848"
magenta = "#885078"
red = "#c45068"
white = "#c0b8b4"
yellow = "#a08850"

[colors.primary]
background = "#0a0810"
bright_foreground = "#dbd4d0"
foreground = "#b8b0ac"

[colors.selection]
background = "#3a2840"
text = "#dbd4d0"

[env]
TERM = "xterm-256color"

[font]
size = 12.0

[font.bold_italic]
family = "ZedMono Nerd Font"
style = "Bold Italic"

[font.bold]
family = "ZedMono Nerd Font"
style = "Bold"

[font.italic]
family = "ZedMono Nerd Font"
style = "Italic"

[font.normal]
family = "ZedMono Nerd Font"
style = "Bold"

[font.offset]
x = 0
y = 1

[window]
decorations = "None"

[window.padding]
x = 5
y = 5
